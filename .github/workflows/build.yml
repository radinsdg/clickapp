name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          command: buildozer android debug
      - uses: actions/upload-artifact@v4
        with:
          name: my-app
          path: ${{ steps.buildozer.outputs.filename }}
